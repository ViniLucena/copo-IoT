<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            
            background-image: url('/static/fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            display: inline-block;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5c0b99;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="text-align: center;">Vincular Copo</h2>

        <form action="/cadastrar" method="POST">
            <label for="nome">Nome Completo do Cliente:</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            
            <label for="numero">Número do Cliente:</label>
            <input type="tel" name="telefone" placeholder="DDD + Número" required>

            <label for="email">Email do Cliente:</label>
            <input type="email" name="email" placeholder="Email" required>

            <button type="submit">Salvar Cadastro</button>
        </form>
    </div>

</body>

</html>
